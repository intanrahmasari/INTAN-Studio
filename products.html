<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Pengaturan Dasar -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Judul -->
    <title>Products | INTAN Studio</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- ==========================
        NAVBAR
========================== -->

<nav class="navbar navbar-expand-lg bg-white shadow-sm sticky-top">

    <div class="container">

        <!-- Logo -->
        <a class="navbar-brand" href="index.html">

            <img
                src="assets/logo.png"
                alt="INTAN Studio"
                height="60">

        </a>

        <!-- Mobile Button -->
        <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarMenu">

            <span class="navbar-toggler-icon"></span>

        </button>

        <!-- Navbar Menu -->
        <div
            class="collapse navbar-collapse"
            id="navbarMenu">

            <!-- Navigation -->
            <ul class="navbar-nav mx-auto">

                <li class="nav-item">

                    <a
                        class="nav-link"
                        href="index.html">

                        Home

                    </a>

                </li>

                <li class="nav-item">

                    <a
                        class="nav-link active"
                        href="products.html">

                        Products

                    </a>

                </li>

                <li class="nav-item">

                    <a
                        class="nav-link"
                        href="about.html">

                        About

                    </a>

                </li>

            </ul>

            <!-- Right Menu -->
            <div class="d-flex align-items-center gap-3">

                <!-- Cart -->
                <a
                    href="cart.html"
                    class="text-dark position-relative text-decoration-none">

                    <i class="bi bi-cart3 fs-4"></i>

                    <span
                        id="cart-count"
                        class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                        style="display:none; font-size:10px;">

                        0

                    </span>

                </a>

                <!-- Login -->
                <a
                    id="accountLink"
                    href="login.html"
                    class="text-dark text-decoration-none d-flex align-items-center gap-1">

                    <i class="bi bi-person-circle fs-5"></i>

                    <span id="accountText">
                        Login
                    </span>

                </a>

            </div>

        </div>

    </div>

</nav>

    <!-- =========================
            PAGE TITLE
    ========================== -->

    <section class="py-5">

        <div class="container text-center">

            <h1 class="fw-bold">
                Our Collection
            </h1>

            <p class="text-muted">
                Discover your favorite fashion items.
            </p>

        </div>

    </section>

    <!-- =========================
            SEARCH
    ========================== -->

    <section class="container mb-3">

    <div class="row justify-content-center">

        <div class="col-lg-10">

            <div class="d-flex gap-3">

                <!-- Search -->

                <div class="input-group">

                    <span class="input-group-text bg-white border-end-0">

                        <i class="bi bi-search"></i>

                    </span>

                    <input
                        type="text"
                        class="form-control border-start-0"
                        id="searchInput"
                        placeholder="Search products...">

                </div>

                <!-- Sort -->

                <select
                    class="form-select"
                    id="sortSelect"
                    style="max-width:230px;">

                    <option value="default">
                        Sort By
                    </option>

                    <option value="az">
                        A - Z
                    </option>

                    <option value="za">
                        Z - A
                    </option>

                    <option value="low">
                        Lowest Price
                    </option>

                    <option value="high">
                        Highest Price
                    </option>

                </select>

            </div>

        </div>

    </div>

    </section>

    <!-- =========================
            CATEGORY
    ========================== -->

    <section class="container mb-3 text-center">

        <button class="btn btn-dark m-1 category-btn active" data-category="All">
            All
        </button>

        <button class="btn btn-outline-dark m-1 category-btn" data-category="T-Shirt">
            T-Shirt
        </button>

        <button class="btn btn-outline-dark m-1 category-btn" data-category="Hoodie">
            Hoodie
        </button>

        <button class="btn btn-outline-dark m-1 category-btn" data-category="Bottom">
            Bottom
        </button>

        <button class="btn btn-outline-dark m-1 category-btn" data-category="Accessories">
            Accessories
        </button>

    </section>

    <!-- =========================
            PRODUCT LIST
    ========================== -->

    <section class="container pb-3">

        <div class="row g-4" id="product-list">

            <!--
                NANTI
                20 PRODUK
                MUNCUL DI SINI
                DENGAN JAVASCRIPT
            -->

        </div>

    </section>

<!-- =========================
        FOOTER
========================== -->

<footer class="bg-dark text-white pt-5 pb-3 mt-5">

    <div class="container">

        <div class="row">

            <!-- Brand -->
            <div class="col-lg-4 mb-4">

                <h3 class="fw-bold">
                    INTAN Studio
                </h3>

                <p class="text-white-50">
                    Wear Your Confidence.
                </p>

            </div>

            <!-- Navigation -->
            <div class="col-lg-4 mb-4">

                <h5 class="fw-bold">
                    Quick Links
                </h5>

                <ul class="list-unstyled">

                    <li>
                        <a href="index.html" class="text-white text-decoration-none">
                            Home
                        </a>
                    </li>

                    <li>
                        <a href="products.html" class="text-white text-decoration-none">
                            Products
                        </a>
                    </li>

                    <li>
                        <a href="about.html" class="text-white text-decoration-none">
                            About
                        </a>
                    </li>

                </ul>

            </div>

            <!-- Contact -->
            <div class="col-lg-4 mb-4">

                <h5 class="fw-bold">
                    Contact
                </h5>

                <p class="mb-2">
                    <i class="bi bi-geo-alt-fill"></i>
                    Bandung, Indonesia
                </p>

                <p class="mb-2">
                    <i class="bi bi-envelope-fill"></i>
                    hello@intanstudio.com
                </p>

                <p>
                    <i class="bi bi-telephone-fill"></i>
                    +62 812-3456-7890
                </p>

            </div>

        </div>

        <hr class="border-secondary">

        <div class="text-center">

            <small class="text-white-50">

                © 2026 INTAN Studio. All Rights Reserved.

            </small>

        </div>

    </div>

</footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Products JS -->
    <script src="js/products.js"></script>
    <script src="js/cart-badge.js"></script>
    <script src="js/auth.js"></script>

</body>

</html>
